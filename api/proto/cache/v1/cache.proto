syntax = "proto3";

package cache.v1;

option go_package = "distributed-cache/internal/gen/cache/v1;cachev1";

service CacheService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  int64 expires_at_unix_ms = 2;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  int64 ttl_ms = 3;
}

message SetResponse {}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {}

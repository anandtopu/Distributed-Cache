services:
  node1:
    build: .
    command:
      - --node-id
      - node1
      - --http
      - :8080
      - --grpc
      - :9090
      - --capacity
      - "100000"
      - --replication
      - "2"
      - --nodes
      - node1=node1:9090,node2=node2:9091,node3=node3:9092
    ports:
      - "8080:8080"
      - "9090:9090"

  node2:
    build: .
    command:
      - --node-id
      - node2
      - --http
      - :8081
      - --grpc
      - :9091
      - --capacity
      - "100000"
      - --replication
      - "2"
      - --nodes
      - node1=node1:9090,node2=node2:9091,node3=node3:9092
    ports:
      - "8081:8081"
      - "9091:9091"

  node3:
    build: .
    command:
      - --node-id
      - node3
      - --http
      - :8082
      - --grpc
      - :9092
      - --capacity
      - "100000"
      - --replication
      - "2"
      - --nodes
      - node1=node1:9090,node2=node2:9091,node3=node3:9092
    ports:
      - "8082:8082"
      - "9092:9092"

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9095:9090"
    depends_on:
      - node1
      - node2
      - node3

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
